<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connection Details</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111827;
      color: #e5edff;
      font-family: "Segoe UI", Tahoma, sans-serif;
      padding: 20px;
    }
    .card {
      width: min(560px, 100%);
      background: #1a2438;
      border: 1px solid #334766;
      border-radius: 12px;
      padding: 20px;
    }
    h1 {
      margin: 0 0 14px;
      color: #7dc3ff;
      font-size: 1.45rem;
    }
    p {
      margin: 8px 0;
      font-size: 1rem;
      color: #c9d8f4;
    }
    .label { color: #94afd7; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Live Connection Details</h1>
    <p><span class="label">Hosted on:</span> <span id="hostPort">Loading...</span></p>
    <p><span class="label">Client IP:</span> <span id="clientIp">Trying to detect...</span></p>
  </main>

  <script>
    (function () {
      var host = window.location.hostname || "unknown-host";
      var port = window.location.port;
      if (!port) port = window.location.protocol === "https:" ? "443" : "80";
      document.getElementById("hostPort").textContent = host + ":" + port;

      var ipEl = document.getElementById("clientIp");
      fetch("https://api.ipify.org?format=json")
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (data) {
          ipEl.textContent = data && data.ip ? data.ip + " (public IP)" : "Not available";
        })
        .catch(function () {
          ipEl.textContent = "Not available (blocked/no internet)";
        });
    })();
  </script>
</body>
</html>
